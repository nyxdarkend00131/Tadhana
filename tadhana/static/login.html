<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tadhana — Login</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;1,400&family=Noto+Sans+Tagalog&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #f5c842; --gold-l: #fde68a; --gold-d: #a07c1e;
      --gold-dim: rgba(245,200,66,0.12);
      --input-bg: #2d1b69; --input-bg-h: #3b2480;
      --text: #e2d5f8; --text-d: #5c4f7a;
      --border: rgba(245,200,66,0.15); --border-h: rgba(245,200,66,0.35);
      --red: #ff3366; --green: #4ade80;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Crimson Text', serif;
      background: radial-gradient(ellipse at 60% 80%, #f5c84230 0%, transparent 60%),
                  radial-gradient(ellipse at 20% 30%, #7c3aed22 0%, transparent 50%),
                  linear-gradient(160deg, #1a0a3d 0%, #2e1065 40%, #1e0b50 70%, #0f0527 100%);
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; overflow-x: hidden;
    }
    .stars-layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star { position: absolute; background: rgba(255,255,255,0.85); border-radius: 50%; animation: tw var(--d,3s) ease-in-out infinite var(--dl,0s); }
    @keyframes tw { 0%,100%{opacity:var(--lo,.1);} 50%{opacity:var(--hi,.7);} }
    .sparkle { position: absolute; pointer-events: none; z-index: 0; }
    .sparkle svg { filter: drop-shadow(0 0 6px var(--gold)); }
    .bottom-glow { position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); width: 600px; height: 200px; background: radial-gradient(ellipse, #f5c84250 0%, transparent 70%); pointer-events: none; z-index: 0; animation: gp 4s ease-in-out infinite; }
    @keyframes gp { 0%,100%{opacity:.6;} 50%{opacity:1;} }

    .card { position: relative; z-index: 10; width: 440px; max-width: 95vw; display: flex; flex-direction: column; align-items: center; padding: 24px 0; animation: fadeUp 1.1s cubic-bezier(.16,1,.3,1) both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(32px);} to{opacity:1;transform:translateY(0);} }

    .logo-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 28px; }
    .baybayin { font-family: 'Noto Sans Tagalog', serif; font-size: 2.6rem; color: var(--gold); letter-spacing: 6px; text-shadow: 0 0 20px #f5c84288, 0 0 40px #f5c84244; margin-bottom: 8px; }
    .brand-name { font-family: 'Cinzel Decorative', serif; font-size: 1.05rem; letter-spacing: 10px; color: var(--gold); text-shadow: 0 0 16px #f5c84266; }
    .brand-sub { font-style: italic; color: var(--gold-d); font-size: 0.9rem; margin-top: 6px; }

    .form-panel { width: 100%; background: rgba(26,10,61,0.75); border: 1px solid var(--border); border-radius: 20px; padding: 32px 36px 28px; backdrop-filter: blur(10px); box-shadow: 0 20px 60px rgba(0,0,0,0.4); }

    .tabs { display: flex; margin-bottom: 28px; background: rgba(255,255,255,0.05); border-radius: 50px; padding: 4px; }
    .tab { flex: 1; padding: 9px; border: none; background: transparent; font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gold-d); cursor: pointer; border-radius: 50px; transition: color .2s, background .2s; }
    .tab.active { background: var(--gold-dim); color: var(--gold); }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field label { font-family: 'Cinzel', serif; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-d); }
    .field input { background: var(--input-bg); border: 1.5px solid rgba(91,63,160,0.3); border-radius: 50px; padding: 13px 20px; font-family: 'Crimson Text', serif; font-size: 0.95rem; color: var(--gold-l); outline: none; caret-color: var(--gold); transition: border-color .3s, box-shadow .3s; }
    .field input::placeholder { color: var(--gold-d); opacity: .7; font-style: italic; }
    .field input:focus { border-color: var(--gold-d); background: var(--input-bg-h); box-shadow: 0 0 18px #f5c84222; }
    .field input.error { border-color: var(--red); }

    .feedback { border-radius: 10px; padding: 10px 16px; font-size: 0.9rem; text-align: center; margin-bottom: 10px; }
    .feedback.error   { background: rgba(255,51,102,0.1); border: 1px solid rgba(255,51,102,0.25); color: var(--red); }
    .feedback.success { background: rgba(74,222,128,0.1);  border: 1px solid rgba(74,222,128,0.25); color: var(--green); }

    .btn-submit { margin-top: 6px; width: 100%; background: linear-gradient(135deg, #1a0a3d 0%, #2e1065 60%, #1a0a3d 100%); border: 1.5px solid var(--gold-d); border-radius: 50px; padding: 14px 20px; font-family: 'Cinzel Decorative', serif; font-size: 0.72rem; color: var(--gold); letter-spacing: 4px; cursor: pointer; text-transform: uppercase; transition: box-shadow .3s, border-color .3s; }
    .btn-submit:hover { border-color: var(--gold); box-shadow: 0 0 24px #f5c84244; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="stars-layer" id="stars"></div>
<div class="bottom-glow"></div>
<div class="sparkle" style="top:10%;right:8%;"><svg width="54" height="54" viewBox="0 0 54 54"><g fill="none" stroke="#f5c842" stroke-width="1.5"><line x1="27" y1="2" x2="27" y2="52"/><line x1="2" y1="27" x2="52" y2="27"/><line x1="9" y1="9" x2="45" y2="45"/><line x1="45" y1="9" x2="9" y2="45"/></g><circle cx="27" cy="27" r="2.5" fill="#f5c842"/></svg></div>
<div class="sparkle" style="bottom:18%;left:6%;"><svg width="38" height="38" viewBox="0 0 38 38"><g fill="none" stroke="#f5c842" stroke-width="1.2"><line x1="19" y1="2" x2="19" y2="36"/><line x1="2" y1="19" x2="36" y2="19"/><line x1="7" y1="7" x2="31" y2="31"/><line x1="31" y1="7" x2="7" y2="31"/></g><circle cx="19" cy="19" r="2" fill="#f5c842"/></svg></div>
<div class="sparkle" style="top:22%;left:12%;"><svg width="22" height="22" viewBox="0 0 22 22"><g fill="none" stroke="#f5c842" stroke-width="1"><line x1="11" y1="1" x2="11" y2="21"/><line x1="1" y1="11" x2="21" y2="11"/><line x1="4" y1="4" x2="18" y2="18"/><line x1="18" y1="4" x2="4" y2="18"/></g></svg></div>

<div id="app">
  <div class="card">
    <div class="logo-wrap">
      <div class="baybayin">ᜆᜇ᜔ᜑᜈ᜔</div>
      <span class="brand-name">T A D H A N A</span>
      <span class="brand-sub">Your tarot reading companion</span>
    </div>

    <div class="form-panel">
      <div class="tabs">
        <button class="tab" :class="{ active: tab === 'login' }" @click="tab = 'login'">Log In</button>
        <button class="tab" :class="{ active: tab === 'register' }" @click="tab = 'register'">Register</button>
      </div>

      <!-- LOGIN -->
      <div v-if="tab === 'login'">
        <div class="field">
          <label>Email</label>
          <input type="email" v-model="login.email" :class="{ error: login.errors.email }" placeholder="your@email.com"/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" v-model="login.password" :class="{ error: login.errors.password }" placeholder="••••••••" @keyup.enter="handleLogin"/>
        </div>
        <div class="feedback" :class="login.feedbackType" v-if="login.feedback">{{ login.feedback }}</div>
        <button class="btn-submit" :disabled="login.loading" @click="handleLogin">
          {{ login.loading ? 'Checking…' : '✦  L O G   I N  ✦' }}
        </button>
      </div>

      <!-- REGISTER -->
      <div v-if="tab === 'register'">
        <div class="field">
          <label>Name</label>
          <input type="text" v-model="reg.name" :class="{ error: reg.errors.name }" placeholder="Your full name"/>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" v-model="reg.email" :class="{ error: reg.errors.email }" placeholder="your@email.com"/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" v-model="reg.password" :class="{ error: reg.errors.password }" placeholder="At least 6 characters"/>
        </div>
        <div class="field">
          <label>Date of Birth <span style="opacity:.5;">(optional)</span></label>
          <input type="date" v-model="reg.dob" style="color-scheme:dark;"/>
        </div>
        <div class="feedback" :class="reg.feedbackType" v-if="reg.feedback">{{ reg.feedback }}</div>
        <button class="btn-submit" :disabled="reg.loading" @click="handleRegister">
          {{ reg.loading ? 'Creating account…' : '✦  C R E A T E   A C C O U N T  ✦' }}
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const { createApp } = Vue;
createApp({
  data() {
    return {
      tab: 'login',
      login: { email: '', password: '', feedback: '', feedbackType: '', loading: false, errors: {} },
      reg:   { name: '', email: '', password: '', dob: '', feedback: '', feedbackType: '', loading: false, errors: {} }
    };
  },
  methods: {
    async handleLogin() {
      this.login.errors = {};
      this.login.feedback = '';
      if (!this.login.email)    this.login.errors.email    = true;
      if (!this.login.password) this.login.errors.password = true;
      if (Object.keys(this.login.errors).length) {
        this.login.feedback = 'Please fill in all fields.';
        this.login.feedbackType = 'error';
        return;
      }
      this.login.loading = true;
      try {
        const res  = await fetch('/api/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: this.login.email, password: this.login.password })
        });
        const data = await res.json();
        if (data.error) {
          this.login.feedback = data.error;
          this.login.feedbackType = 'error';
        } else {
          this.login.feedback = 'Welcome back, ' + data.name + '!';
          this.login.feedbackType = 'success';
          localStorage.setItem('user_id', data.user_id);
          localStorage.setItem('username', data.name);
          setTimeout(() => window.location.href = '/readings.html', 1000);
        }
      } catch (e) {
        this.login.feedback = 'Cannot reach server. Is it running?';
        this.login.feedbackType = 'error';
      }
      this.login.loading = false;
    },

    async handleRegister() {
      this.reg.errors = {};
      this.reg.feedback = '';
      if (!this.reg.name)     this.reg.errors.name     = true;
      if (!this.reg.email)    this.reg.errors.email    = true;
      if (!this.reg.password) this.reg.errors.password = true;
      if (Object.keys(this.reg.errors).length) {
        this.reg.feedback = 'Please fill in all required fields.';
        this.reg.feedbackType = 'error';
        return;
      }
      if (this.reg.password.length < 6) {
        this.reg.errors.password = true;
        this.reg.feedback = 'Password must be at least 6 characters.';
        this.reg.feedbackType = 'error';
        return;
      }
      this.reg.loading = true;
      try {
        const res  = await fetch('/api/register', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: this.reg.name, email: this.reg.email, password: this.reg.password, date_of_birth: this.reg.dob || null })
        });
        const data = await res.json();
        if (data.error) {
          this.reg.feedback = data.error;
          this.reg.feedbackType = 'error';
        } else {
          this.reg.feedback = 'Account created! Switching to login…';
          this.reg.feedbackType = 'success';
          const email = this.reg.email;
          setTimeout(() => { this.tab = 'login'; this.login.email = email; }, 1400);
        }
      } catch (e) {
        this.reg.feedback = 'Cannot reach server. Is it running?';
        this.reg.feedbackType = 'error';
      }
      this.reg.loading = false;
    }
  }
}).mount('#app');

// stars
const sl = document.getElementById('stars');
for (let i = 0; i < 120; i++) {
  const s = document.createElement('div'); s.className = 'star';
  const sz = Math.random() * 2.2 + 0.6;
  s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+2).toFixed(1)}s;--dl:-${(Math.random()*4).toFixed(1)}s;--lo:${(Math.random()*0.1+0.03).toFixed(2)};--hi:${(Math.random()*0.5+0.25).toFixed(2)};`;
  sl.appendChild(s);
}
</script>
</body>
</html>
